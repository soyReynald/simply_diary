<!DOCTYPE html>
<html lang="en" version="5">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary to save texts</title>
    <link rel="icon" type="image/x-icon" href="">
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header>
        <span>
            <span id="date"></span>
        </span>
    </header>
    <main>
        <!-- Section to insert text -->
        <section id="text_saver">
            <form>
                <div class="space-y-12">
                    <div class="border-b border-gray-900/10 pb-12">

                            <div class="col-span-full">
                                <label for="about" class="block text-sm/6 font-medium text-gray-900">Diary text:</label>
                                <div class="mt-2">
                                    <textarea id="about" name="about" rows="3"
                                        class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"></textarea>
                                </div>
                                <p class="mt-3 text-sm/6 text-gray-600">Write a few sentences about your day.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6 flex items-center justify-end gap-x-6">
                    <button type="button" class="text-sm/6 font-semibold text-gray-900">Cancel</button>
                    <button type="submit"
                        class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Save</button>
                </div>
            </form>

        </section>

        <section id="diary_showcase_">
            <span>
                March 15, 2026
            </span>
            <h3>
            </h3>
            <br/>
            <br/>
            <p>
                Sample text.
            </p>
        </section>

    </main>
    <script type="text/javascript">
        const today = new Date();
        const date = new Date().toDateString();
        document.getElementById("date").innerHTML = `${date}`;

        //* Let's call the JSON object and show it into the console
        // https://jsonsaver.com/api/v1/jsonstore/public/diary_object_json/

        async function getData() {
            const url = "https://jsonsaver.com/api/v1/jsonstore/public/diary_object_json/";
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Response status: ${response.status}`);
                }

                const result = await response.json();
                // console.log(result);
                document.querySelector("#diary_showcase_ span").innerHTML = result.data.global_diary_Object.object.title;
                document.querySelector("#diary_showcase_ h3").innerHTML = result.data.global_diary_Object.title;
                document.querySelector("#diary_showcase_ p").innerHTML = result.data.global_diary_Object.object.diary_text;
            } catch (error) {
                console.error(error.message);
            }
        }

        getData();
    </script>
</body>

</html>
