<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login</title>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <form id="myForm" class="bg-white p-8 rounded shadow-md w-full max-w-sm">
        <h2 class="text-black font-bold mb-4 uppercase">Formulary login</h2>
         <div class="mb-4">
            <label for="username" class="block text-gray-700 text-sm font-semibold mb-2">User login:</label>
            <input class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" id="username" name="username">
         </div>
        
        <label for="passwor" class="block text-gray-700 text-sm font-semibold mb-2">Password:</label>
        <input class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" type="password" id="passwor" name="passwor">
  
        <button type="button" onclick="javascript:login();" class="mt-6 cursor-pointer w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Submit</button>
    </form>
</body>
<script type="text/javascript">
    // Creating an user to be retrieve on our database easier as JSON
    async function login() {
        var user_name_ = document.getElementById("username").value;

        const url = "http://localhost/simply_diary/api/users.php";
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Response status: ${response.status}`);
            }

            const result = await response.json();
            
            if (result.username == user_name_) {
                alert("User is equal");
            }
        } catch (error) {
            console.error(error.message);
        }
    }        
</script>
</html>
